{% extends "base.html" %}
{% block title %}Connexion admin — CommuneSanté{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-xl font-bold text-gray-800">Administration</h1>
      <p class="text-sm text-gray-400">CommuneSanté</p>
    </div>
    <form method="POST">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
        <input type="text" name="username" required autofocus
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
               placeholder="admin">
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input type="password" name="password" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
               placeholder="••••••••">
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg text-sm transition">
        Se connecter
      </button>
    </form>
  </div>
</div>
{% endblock %}
