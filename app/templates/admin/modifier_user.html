{% extends "admin_base.html" %}
{% block title %}Modifier utilisateur — Admin CommuneSanté{% endblock %}
{% block breadcrumb %} › <a href="{{ url_for('admin.users') }}" class="hover:text-gray-600">Utilisateurs</a> › <span class="text-gray-800 font-medium">Modifier</span>{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Modifier « {{ user.username }} »</h1>

<div class="max-w-lg">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form method="POST">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur *</label>
        <input type="text" name="username" required value="{{ user.username }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Nouveau mot de passe <span class="text-gray-400 font-normal">(laisser vide pour ne pas changer)</span>
        </label>
        <input type="password" name="password" minlength="6"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Rôle *</label>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="role" value="gestionnaire"
                   {% if user.role == 'gestionnaire' %}checked{% endif %} class="text-emerald-600">
            <span class="text-sm text-gray-700">Gestionnaire de ville</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="role" value="super_admin"
                   {% if user.role == 'super_admin' %}checked{% endif %} class="text-emerald-600">
            <span class="text-sm text-gray-700">Super administrateur</span>
          </label>
        </div>
      </div>
      <div class="mb-4" id="villes-section" {% if user.role == 'super_admin' %}style="display:none"{% endif %}>
        <label class="block text-sm font-medium text-gray-700 mb-2">Villes assignées</label>
        <div class="space-y-2">
          {% for v in villes %}
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="ville_ids" value="{{ v.id }}"
                   {% if v.id in user_ville_ids %}checked{% endif %}
                   class="text-emerald-600 rounded">
            <span class="text-sm text-gray-700">{{ v.nom }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="mb-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="actif" value="1" {% if user.actif %}checked{% endif %}
                 class="w-4 h-4 text-emerald-600 rounded">
          <span class="text-sm text-gray-700">Compte actif</span>
        </label>
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition">
        Enregistrer
      </button>
    </form>
  </div>
</div>

<script>
  document.querySelectorAll('input[name="role"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
      document.getElementById('villes-section').style.display =
        this.value === 'gestionnaire' ? 'block' : 'none';
    });
  });
</script>
{% endblock %}
