{% extends "admin_base.html" %}
{% block title %}Nouvelle ville — Admin CommuneSanté{% endblock %}
{% block breadcrumb %} › <a href="{{ url_for('admin.villes') }}" class="hover:text-gray-600">Villes</a> › <span class="text-gray-800 font-medium">Nouvelle ville</span>{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Nouvelle ville</h1>

<div class="max-w-lg">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form method="POST">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label>
        <input type="text" name="nom" required placeholder="Ex : Sautron"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Slug * <span class="text-gray-400 font-normal">(identifiant URL, sans espaces ni accents)</span>
        </label>
        <input type="text" name="slug" required placeholder="Ex : sautron"
               pattern="[a-z0-9\-]+"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Population</label>
        <input type="number" name="population" min="0" placeholder="Ex : 8600"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition">
        Créer la ville
      </button>
    </form>
  </div>
</div>
{% endblock %}
