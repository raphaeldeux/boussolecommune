{% extends "admin_base.html" %}
{% block title %}{{ 'Modifier' if conseil else 'Nouveau' }} conseil · Admin{% endblock %}

{% block content %}
<div class="max-w-xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">
    {{ 'Modifier le conseil' if conseil else 'Ajouter un conseil' }}
  </h1>

  <form method="POST"
        class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Date du conseil *</label>
      <input type="date" name="date_conseil"
             value="{{ conseil.date_conseil if conseil else '' }}"
             required
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Type de conseil *</label>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="type_conseil" value="municipal"
                 {% if not conseil or conseil.type_conseil == 'municipal' %}checked{% endif %}
                 class="text-emerald-600">
          <span class="text-sm text-gray-700">🏛️ Conseil municipal</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="type_conseil" value="metropolitain"
                 {% if conseil and conseil.type_conseil == 'metropolitain' %}checked{% endif %}
                 class="text-emerald-600">
          <span class="text-sm text-gray-700">🏙️ Conseil métropolitain</span>
        </label>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Titre *</label>
      <input type="text" name="titre"
             value="{{ conseil.titre if conseil else '' }}"
             placeholder="Ex : Conseil municipal du 15 janvier 2025"
             required
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
        {{ 'Enregistrer' if conseil else 'Ajouter' }}
      </button>
      <a href="{{ url_for('admin.conseils') }}"
         class="text-gray-500 hover:text-gray-700 text-sm">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
