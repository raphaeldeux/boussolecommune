{% extends "admin_base.html" %}
{% block title %}Nouveau document — Admin{% endblock %}

{% block content %}
<div class="max-w-xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Ajouter un document public</h1>

  <form method="POST" enctype="multipart/form-data"
        class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Titre *</label>
      <input type="text" name="titre" required
             placeholder="Ex : Budget primitif 2025"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
      <select name="categorie"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat | capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fichier (PDF, Word…)</label>
      <input type="file" name="fichier"
             class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0
                    file:text-sm file:font-medium file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
        Ajouter
      </button>
      <a href="{{ url_for('admin.documents') }}" class="text-gray-500 hover:text-gray-700 text-sm">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
