version: '3.8'
services:
  web:
    build: .
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file: .env
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
